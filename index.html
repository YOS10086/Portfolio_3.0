body {
  background-color: #faf7f2;
}

      * {
        margin: 0;
        padding: 0;
      }

      header {
  position: sticky;
  top: 0;
  height: 5vw;                 /* controls header size */
  display: flex;
  align-items: center;         /* vertical centering */
  justify-content: center;     /* center name */
  z-index: 10;


background: linear-gradient(
    to bottom,
    rgba(244, 241, 236, 0.85) 0%,
    rgba(244, 241, 236, 0.411) 50%,
    rgba(244, 241, 236, 0) 100%
  );
}


      header .header-buttons {
        position: absolute;
        right: 10px; 
        top: 50%; 
        transform: translateY(-50%);
        
      }

  
      header button {
        padding: 5px 10px;
        background-color: transparent;
        color: rgb(0, 0, 0);
        border: none;
        font-size: 2vw;
        cursor: pointer;
        border-radius: 3px;
        margin-left: 1px;
        
      }

      /* Home Button */
      header .home-button {
        position: absolute;
        left: 0vw; 
        top: 50%; 
        transform: translateY(-50%);
        font-size: 2.5vw;
        background-color: transparent;
        color: rgb(0, 0, 0);
        border: none;
        cursor: pointer;
        padding: 5px 20px;
        
      }

      .content > div {
        height: 50px;
      }

      .grid-container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 45px;
        padding: 23px 12vw;

        margin-top: 5vw;
      }

      .imgbox {
        position: relative;
        text-align: center;
        overflow: hidden;
        cursor: pointer;
        border: none;

         /* animation start state */
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.8s ease, transform 0.8s ease;
        
      }


.imgbox.show {
  opacity: 1;
  transform: translateY(0);
}





      .imgboxnobutton {
  position: relative;
  text-align: center;

  margin-top: 8.5vw;     /* CHANGE THIS FOR THE TOP INTRO */

  margin-bottom: 19vw;
}


      .center-fit {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: filter 0.5s ease;
      }

      .centered {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 3vw;
        color: white;
        visibility: hidden;
        opacity: 0;
        transition: opacity 0.5s ease;
      }

      

      .left-fit {
        width: 100%;
        height: 100%;
        object-fit: contain;
        font-size: 3vw;
        margin-top: 20px;
      }

      .button {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        padding: 10px 20px;
        background-color: rgba(255, 255, 255, 0.7);
        color: black;
        border: none;
        font-size: 16px;
        cursor: pointer;
        border-radius: 5px;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.5s ease;
      }

      .imgbox:hover .center-fit {
        filter: brightness(50%);
      }

      .imgbox:hover .centered {
        visibility: visible;
        opacity: 1;
      }

      .imgbox:hover .button {
        visibility: visible;
        opacity: 1;
      }

      .flex-container {
        display: flex;
        flex-wrap: wrap;
        font-size: 10px;
        text-align: center;
      }

      .titleoffright {
        position: absolute;
        top: 30%;
        left: 75%;
        transform: translate(-50%, -50%);
        font-size: 10.5vw;
      }

       .titleoffright2 {
        position: absolute;
        top: 48%;
        left: 17%;
        transform: translate(-50%, -50%);
        font-size: 3vw;
        width: 10%;
         text-align: left;
      }
      

      .headingleft {
        position: absolute;
        top: 90%;
        left: 25%;
        transform: translate(-50%, -50%);
        font-size: 6vw;
      }

          .titlesmall {
        position: absolute;
        top: 60%;
        left: 75%;
        transform: translate(-50%, -50%);
        font-size: 3.5vw;
      }

       .upperbodytext {
        position: absolute;
        top:50%;
        left: 70%;
        transform: translate(-50%, -50%);
        font-size: 1.5vw;
         width: 30%;
            text-align: left;
      }


.mid-links {
  display: grid;
  grid-template-columns: 52vw 30vw;
  grid-template-rows: 30vw 25vw;
  gap: 4vw;
  justify-content: center;
  margin: 0.5vw 0;
  
  
}

.mid-imgbox {
  border: none;
  background: none;
  cursor: pointer;
  overflow: hidden;
  padding: 0;
}

.mid-imgbox img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.4s ease;
}

.mid-imgbox:hover img {
  transform: scale(1.08);
}

/* Explicit placement */
.large {
  grid-column: 1;
  grid-row: 1 / span 2;
 
}

.top {
  grid-column: 2;
  grid-row: 1;
}

.bottom {
  grid-column: 2;
  grid-row: 2;
}

.large {
  width: 96%;
  height: 96%;
}



.small {
  width: 100%;
  height: 100%;
}

// opacity img
 

const boxes = document.querySelectorAll(".imgbox");

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("show");
    }
  });
}, {
  threshold: 0.2
});

boxes.forEach(box => {
  observer.observe(box);
});
